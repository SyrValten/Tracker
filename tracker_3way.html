<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tracker 3-Way · Polymarket</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#2a3242;
    --tx:#e6edf3; --tx2:#8b949e; --pos:#3fb950; --neg:#f85149; --acc:#58a6ff; --warn:#d29922;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.5 system-ui,-apple-system,Segoe UI,sans-serif}
  /* margin:0 (no auto) para que la barra quede pegada a la izquierda,
     igual que en el tracker principal, en vez de centrarse en pantallas anchas */
  .shell{display:grid;grid-template-columns:minmax(200px,240px) minmax(0,1fr);gap:18px;
         max-width:1600px;margin:0;padding:20px 14px 60px;align-items:start}
  @media (max-width:820px){ .shell{grid-template-columns:1fr} }
  .side{background:var(--panel);border:1px solid var(--line);border-radius:10px;
        padding:14px;height:fit-content;position:sticky;top:24px}
  .side h2{font-size:13px;margin:0 0 10px;text-transform:uppercase;letter-spacing:.5px;color:var(--tx2)}
  .fav{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);
       color:var(--tx);padding:8px 10px;border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:13px}
  .fav:hover{border-color:var(--acc)}
  .fav.on{border-color:var(--acc);background:rgba(88,166,255,.12)}
  .fav .addr{display:block;color:var(--tx2);font-family:ui-monospace,monospace;font-size:11px;margin-top:2px}
  .side .empty{color:var(--tx2);font-size:12px;line-height:1.5}
  .back{display:inline-block;margin-top:14px;font-size:12px;color:var(--acc);text-decoration:none}
  .wrap{min-width:0}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:var(--tx2);font-size:13px;margin-bottom:20px}
  .bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
  input{flex:1;min-width:280px;background:var(--panel);border:1px solid var(--line);color:var(--tx);
        padding:10px 12px;border-radius:8px;font-family:ui-monospace,monospace;font-size:13px}
  button{background:var(--acc);color:#04101f;border:0;padding:10px 18px;border-radius:8px;
         font-weight:600;cursor:pointer;font-size:13px}
  button:disabled{opacity:.5;cursor:default}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:22px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .card .k{color:var(--tx2);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .card .v{font-size:19px;font-weight:700;margin-top:3px}
  .ev{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:10px;overflow:hidden}
  .ev>summary{list-style:none;cursor:pointer;padding:12px 14px;display:grid;
              grid-template-columns:1fr auto auto auto;gap:14px;align-items:center}
  .ev>summary::-webkit-details-marker{display:none}
  .ev>summary:hover{background:var(--panel2)}
  .ttl{font-weight:600}
  .meta{color:var(--tx2);font-size:12px;font-family:ui-monospace,monospace}
  .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .pos{color:var(--pos)} .neg{color:var(--neg)} .dim{color:var(--tx2)}
  .tag{font-size:11px;padding:2px 8px;border-radius:99px;border:1px solid var(--line);color:var(--tx2)}
  .tag.t3{border-color:#2d6a3d;color:var(--pos)}
  .tag.tp{border-color:#7a5c12;color:var(--warn)}
  .tag.open{border-color:#1f4f82;color:var(--acc)}
  .tag.res{display:inline-block;margin-bottom:5px;font-weight:600;color:var(--tx);background:var(--panel2)}
  .tag.res.draw{border-color:#7a5c12;color:var(--warn)}
  .tag.res.win{border-color:#2d6a3d;color:var(--pos)}
  table{width:100%;border-collapse:collapse;background:var(--panel2)}
  th,td{padding:8px 14px;border-top:1px solid var(--line);font-size:13px}
  th{color:var(--tx2);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.4px;text-align:left}
  .pill{font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px}
  .pill.w{background:rgba(63,185,80,.15);color:var(--pos)}
  .pill.l{background:rgba(248,81,73,.15);color:var(--neg)}
  .pill.o{background:rgba(88,166,255,.15);color:var(--acc)}
  .pill.s{background:rgba(210,153,34,.15);color:var(--warn)}
  .msg{padding:30px;text-align:center;color:var(--tx2)}
  a{color:var(--acc)}
</style>
</head>
<body>
<div class="shell">
<aside class="side">
  <h2>Favoritos</h2>
  <div id="favs"><div class="empty">Sin favoritos guardados.</div></div>
  <a class="back" href="index.html">← Volver al tracker principal</a>
</aside>

<div class="wrap">
  <h1>Tracker 3-Way · apuestas NO multi-pata</h1>
  <div class="sub">Agrupa por <code>eventSlug</code> para ver las 3 patas (local / visitante / empate) como una sola operación, con ganadoras y perdedoras.</div>

  <div class="bar">
    <input id="w" value="0x59b411fd0c84a401f4e60c4b5c43e6fc3431ca99" placeholder="0x...">
    <button id="go">Cargar</button>
  </div>

  <div id="stats" class="stats" hidden></div>
  <div id="out"><div class="msg">Pulsa Cargar para analizar la wallet.</div></div>
</div>
</div>

<script>
const DATA='https://data-api.polymarket.com', GAMMA='https://gamma-api.polymarket.com';
const $=id=>document.getElementById(id);
const usd=n=>(n<0?'-':'')+'$'+Math.abs(n).toFixed(2);
const cls=n=>n>0?'pos':n<0?'neg':'dim';
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function jget(url){
  const r=await fetch(url);
  if(!r.ok) throw new Error(r.status+' '+r.statusText);
  return r.json();
}

// Toda la actividad, paginada.
async function allActivity(user){
  const out=[]; let off=0;
  for(let p=0;p<40;p++){
    const d=await jget(`${DATA}/activity?user=${user}&limit=100&offset=${off}&sortBy=TIMESTAMP&sortDirection=DESC`);
    if(!Array.isArray(d)) throw new Error('respuesta /activity inesperada');
    out.push(...d);
    if(d.length<100) break;
    off+=100;
  }
  return out;
}

// Resolución real de cada mercado desde Gamma (en tandas de 20 slugs).
async function eventsBySlug(slugs){
  const map=new Map();
  for(let i=0;i<slugs.length;i+=20){
    const q=slugs.slice(i,i+20).map(s=>'slug='+encodeURIComponent(s)).join('&');
    const evs=await jget(`${GAMMA}/events?${q}`);
    for(const e of evs) map.set(e.slug,e);
  }
  return map;
}

function parseArr(v){
  if(Array.isArray(v)) return v;
  try{ return JSON.parse(v||'[]'); }catch{ return []; }
}

function analyze(acts, evMap){
  // legKey = conditionId. Acumula coste y shares netas por pata.
  const events=new Map();
  for(const a of acts){
    if(a.type!=='TRADE') continue;
    const es=a.eventSlug||a.slug;
    if(!events.has(es)) events.set(es,{slug:es,title:'',icon:a.icon,legs:new Map(),ts:0});
    const ev=events.get(es);
    ev.ts=Math.max(ev.ts,a.timestamp||0);
    if(!ev.legs.has(a.conditionId))
      ev.legs.set(a.conditionId,{cond:a.conditionId,slug:a.slug,title:a.title,outcome:a.outcome,
                                 outcomeIndex:a.outcomeIndex,bShares:0,bCost:0,sShares:0,sProc:0});
    const L=ev.legs.get(a.conditionId);
    if(a.side==='SELL'){ L.sShares+=a.size||0; L.sProc+=a.usdcSize||0; }
    else               { L.bShares+=a.size||0; L.bCost+=a.usdcSize||0; }
  }

  const rows=[];
  for(const ev of events.values()){
    const g=evMap.get(ev.slug);
    ev.title=g?.title||ev.slug;
    const byCond=new Map();
    for(const m of (g?.markets||[])) byCond.set(m.conditionId,m);

    // Resultado real del partido: la pata del evento que resolvió "Yes" (índice 0).
    // Se lee de TODOS los markets del evento, apostara o no en ellos.
    ev.result=null;
    for(const m of (g?.markets||[])){
      const p=parseArr(m.outcomePrices).map(Number);
      if(m.closed && p[0]>=0.5){
        const gt=m.groupItemTitle||'';
        ev.result = /^draw\b/i.test(gt) || /end in a draw/i.test(m.question||'')
                  ? {kind:'draw', name:'Empate'}
                  : {kind:'win', name:gt||m.question||'?'};
        break;
      }
    }

    let bCost=0,sProc=0,redeem=0,settled=0,won=0,lost=0,sold=0;
    for(const L of ev.legs.values()){
      const m=byCond.get(L.cond);
      const prices=parseArr(m?.outcomePrices).map(Number);
      const idx=L.outcomeIndex ?? 1;              // la pata es "No" → índice 1
      const resolved=!!m?.closed && prices.length>idx;
      L.held=L.bShares-L.sShares;                 // shares que llegan a la resolución
      L.open = !resolved && L.held>0.01;
      L.sold = L.sShares>0.01 && L.held<=0.01;    // salió antes del cierre

      if(resolved){
        L.finalPrice=prices[idx];
        L.redeem=Math.max(L.held,0)*prices[idx];  // cobro al resolver
        L.pnl=L.sProc+L.redeem-L.bCost;
        L.win = L.held>0.01 ? prices[idx]>=0.5 : null;   // sin shares vivas no hay G/P
        if(L.win===true) won++; else if(L.win===false) lost++;
        if(L.sold) sold++;
        settled++;
        redeem+=L.redeem;
      }else{
        L.finalPrice=null; L.redeem=null;
        L.pnl = L.open ? null : L.sProc-L.bCost;  // cerrada por venta: PnL ya realizado
        if(!L.open){ settled++; sold++; }
      }
      bCost+=L.bCost; sProc+=L.sProc;
    }
    ev.bCost=bCost; ev.sProc=sProc; ev.redeem=redeem;
    ev.cost=bCost-sProc;                          // capital neto en riesgo
    ev.allResolved = settled===ev.legs.size && ev.legs.size>0;
    ev.pnl = ev.allResolved ? sProc+redeem-bCost : null;
    ev.won=won; ev.lost=lost; ev.sold=sold; ev.nLegs=ev.legs.size;
    rows.push(ev);
  }
  rows.sort((a,b)=>b.ts-a.ts);
  return rows;
}

function renderStats(rows){
  const done=rows.filter(r=>r.allResolved);
  const pnl=done.reduce((s,r)=>s+r.pnl,0);
  const inv=rows.reduce((s,r)=>s+r.bCost,0);
  const wins=done.filter(r=>r.pnl>0).length;
  const legsW=rows.reduce((s,r)=>s+r.won,0), legsL=rows.reduce((s,r)=>s+r.lost,0);
  const legsS=rows.reduce((s,r)=>s+r.sold,0);
  const three=rows.filter(r=>r.nLegs===3).length;
  const roi=inv?pnl/inv*100:0;
  const S=[
    ['Eventos',rows.length,''],
    ['Con 3 patas',`${three} / ${rows.length}`,''],
    ['Comprado',usd(inv),''],
    ['PnL cerrado',usd(pnl),cls(pnl)],
    ['ROI',roi.toFixed(2)+'%',cls(roi)],
    ['Eventos ganados',`${wins} / ${done.length}`,''],
    ['Patas G / P / vendidas',`${legsW} / ${legsL} / ${legsS}`,''],
  ];
  $('stats').hidden=false;
  $('stats').innerHTML=S.map(([k,v,c])=>`<div class="card"><div class="k">${k}</div><div class="v ${c}">${v}</div></div>`).join('');
}

function renderRows(rows){
  if(!rows.length){ $('out').innerHTML='<div class="msg">Sin operaciones para esta wallet.</div>'; return; }
  $('out').innerHTML=rows.map(ev=>{
    const legs=[...ev.legs.values()].map(L=>{
      const st = L.open  ? '<span class="pill o">ABIERTA</span>'
               : L.sold  ? '<span class="pill s">VENDIDA</span>'
               : L.win   ? '<span class="pill w">GANADA</span>'
               : L.win===false ? '<span class="pill l">PERDIDA</span>'
               : '<span class="pill s">CERRADA</span>';
      const avg = L.bShares? (L.bCost/L.bShares) : 0;
      return `<tr>
        <td>${esc(L.title)}<div class="meta">${esc(L.slug)}</div></td>
        <td><span class="tag">${esc(L.outcome||'No')}</span></td>
        <td class="num">${Math.round(avg*100)}¢</td>
        <td class="num">${L.bShares.toFixed(2)}</td>
        <td class="num">${usd(L.bCost)}</td>
        <td class="num">${L.sProc?usd(L.sProc):'<span class="dim">—</span>'}</td>
        <td class="num">${L.redeem==null?'<span class="dim">—</span>':usd(L.redeem)}</td>
        <td class="num ${L.pnl==null?'dim':cls(L.pnl)}">${L.pnl==null?'—':usd(L.pnl)}</td>
        <td>${st}</td></tr>`;
    }).join('');
    const legTag = ev.nLegs===3 ? '<span class="tag t3">3 patas</span>'
                 : `<span class="tag tp">${ev.nLegs} pata${ev.nLegs>1?'s':''}</span>`;
    const state = ev.allResolved ? '' : '<span class="tag open">en curso</span>';
    const res = ev.result
      ? `<span class="tag res ${ev.result.kind}">${ev.result.kind==='draw'
           ? '🤝 Empate' : '🏆 '+esc(ev.result.name)}</span>`
      : '<span class="tag">sin resolver</span>';
    const pnlTxt = ev.pnl==null ? '<span class="dim">pendiente</span>'
                 : `<span class="${cls(ev.pnl)}">${usd(ev.pnl)}</span>`;
    return `<details class="ev">
      <summary>
        <div><div class="ttl">${esc(ev.title)}</div>
             <div class="meta">${esc(ev.slug)} · ${new Date(ev.ts*1000).toLocaleString('es-ES')}</div></div>
        <div>${res}<br>${legTag} ${state}</div>
        <div class="num dim">comprado ${usd(ev.bCost)}${ev.sProc?` · vendido ${usd(ev.sProc)}`:''}</div>
        <div class="num" style="font-weight:700;min-width:90px">${pnlTxt}</div>
      </summary>
      <table><thead><tr><th>Mercado</th><th>Lado</th><th class="num">Precio medio</th><th class="num">Shares</th>
        <th class="num">Comprado</th><th class="num">Vendido</th><th class="num">Cobro</th>
        <th class="num">PnL</th><th>Estado</th></tr></thead>
        <tbody>${legs}</tbody></table>
    </details>`;
  }).join('');
}

async function run(){
  const user=$('w').value.trim().toLowerCase();
  if(!/^0x[0-9a-f]{40}$/.test(user)){ $('out').innerHTML='<div class="msg">Dirección no válida.</div>'; return; }
  $('go').disabled=true; $('out').innerHTML='<div class="msg">Cargando actividad…</div>';
  try{
    const acts=await allActivity(user);
    const slugs=[...new Set(acts.filter(a=>a.type==='TRADE').map(a=>a.eventSlug||a.slug))];
    $('out').innerHTML=`<div class="msg">Resolviendo ${slugs.length} eventos…</div>`;
    const evMap=await eventsBySlug(slugs);
    const rows=analyze(acts,evMap);
    renderStats(rows); renderRows(rows);
  }catch(e){
    $('out').innerHTML=`<div class="msg neg">Error: ${esc(e.message)}</div>`;
  }finally{ $('go').disabled=false; }
}
$('go').onclick=run;
$('w').addEventListener('keydown',e=>{ if(e.key==='Enter') run(); });

// --- Favoritos ---------------------------------------------------------
// Se leen del MISMO localStorage que el tracker principal ('polymarketFavorites'),
// así que la lista se mantiene sola: lo que guardes allí sale aquí.
// Se aceptan las dos formas que usa main.js: {wallet,label} o string suelto.
const FAV_KEY='polymarketFavorites';

function normalizeFavs(raw){
  if(!Array.isArray(raw)) return [];
  return raw.map(it=>{
    if(it && typeof it==='object'){
      // {wallet,label} del tracker principal, o {w,l} comprimido de la URL
      const w=it.wallet||it.w;
      if(typeof w==='string') return {wallet:w, label:it.label||it.l||short(w)};
    }
    if(typeof it==='string') return {wallet:it, label:short(it)};
    return null;
  }).filter(Boolean);
}

function readFavs(){
  try{
    return normalizeFavs(JSON.parse(localStorage.getItem(FAV_KEY)||'[]'));
  }catch(e){ console.warn('No se pudieron leer los favoritos:',e); return []; }
}

function saveFavs(list){
  try{
    localStorage.setItem(FAV_KEY, JSON.stringify(
      list.map(f=>({wallet:f.wallet, label:f.label}))));
  }catch(e){ console.warn('No se pudieron guardar los favoritos:',e); }
}
const short=w=>`${w.slice(0,6)}…${w.slice(-4)}`;

function renderFavs(){
  const favs=readFavs(), box=$('favs');
  if(!favs.length){
    box.innerHTML='<div class="empty">Sin favoritos guardados.<br>Añádelos con la estrella ☆ del tracker principal.</div>';
    return;
  }
  const cur=$('w').value.trim().toLowerCase();
  box.innerHTML=favs.map(f=>
    `<button class="fav${f.wallet.toLowerCase()===cur?' on':''}" data-w="${esc(f.wallet)}">
       ${esc(f.label)}<span class="addr">${esc(short(f.wallet))}</span></button>`).join('');
  box.querySelectorAll('.fav').forEach(b=>{
    b.onclick=()=>{ $('w').value=b.dataset.w; renderFavs(); run(); };
  });
}

// Arranque: el botón ⚽ del tracker principal llega con ?wallet=… y ?favs=…
(function init(){
  const p=new URLSearchParams(location.search);

  // Favoritos que vienen en la URL: se fusionan con los locales y se guardan,
  // así la próxima vez están aquí aunque se abra la página directamente.
  const rawFavs=p.get('favs');
  if(rawFavs){
    try{
      const fromUrl=normalizeFavs(JSON.parse(rawFavs));
      if(fromUrl.length){
        const seen=new Set(fromUrl.map(f=>f.wallet.toLowerCase()));
        const merged=[...fromUrl, ...readFavs().filter(f=>!seen.has(f.wallet.toLowerCase()))];
        saveFavs(merged);
      }
    }catch(e){ console.warn('Favoritos de la URL ilegibles:',e); }
  }

  const w=(p.get('wallet')||p.get('w')||'').trim();
  if(/^0x[0-9a-fA-F]{40}$/.test(w)) $('w').value=w.toLowerCase();
  renderFavs();
  if(w) run();
})();
</script>
</body>
</html>
